<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AGENTWORLD × Isotopy's Knowledge Graph</title>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@300;400&display=swap">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: #0a0a14;
  color: #c8c8d0;
  font-family: 'Inter', -apple-system, system-ui, sans-serif;
  height: 100vh;
  overflow: hidden;
}

#graph { width: 100vw; height: 100vh; }

#title-card {
  position: fixed; top: 20px; left: 20px; z-index: 10;
  background: rgba(8, 8, 18, 0.92);
  border: 1px solid rgba(120, 160, 255, 0.15);
  border-radius: 14px;
  padding: 20px 24px;
  backdrop-filter: blur(16px);
  box-shadow: 0 8px 32px rgba(0,0,0,0.5);
  max-width: 380px;
}
#title-card h1 {
  font-size: 17px;
  font-weight: 600;
  color: #e8ecf4;
  letter-spacing: -0.02em;
  margin-bottom: 4px;
}
#title-card .subtitle {
  font-size: 12px;
  color: #667;
  font-weight: 300;
  margin-bottom: 12px;
}
#title-card .stat-row {
  display: flex;
  gap: 16px;
  font-size: 11px;
  color: #889;
  font-family: 'JetBrains Mono', monospace;
}
#title-card .stat-val {
  color: #aab4cc;
  font-weight: 500;
}

#info-panel {
  position: fixed; top: 20px; right: 20px; z-index: 10;
  width: 360px;
  background: rgba(8, 8, 18, 0.92);
  border: 1px solid rgba(120, 160, 255, 0.15);
  border-radius: 14px;
  padding: 20px 22px;
  backdrop-filter: blur(16px);
  box-shadow: 0 8px 32px rgba(0,0,0,0.5);
  max-height: 70vh;
  overflow-y: auto;
  display: none;
}
#info-panel h2 {
  font-size: 14px;
  font-weight: 500;
  color: #e0e4ec;
  margin-bottom: 6px;
  line-height: 1.3;
}
#info-panel .node-type {
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 0.8px;
  margin-bottom: 10px;
  font-weight: 500;
}
#info-panel .summary {
  font-size: 12px;
  line-height: 1.55;
  color: #99a;
  margin-bottom: 12px;
}
#info-panel .edge-list {
  font-size: 11px;
  font-family: 'JetBrains Mono', monospace;
  line-height: 1.7;
}
#info-panel .edge-list .pred {
  color: #7a9;
  font-style: italic;
}
#info-panel .edge-list .target {
  color: #8ab4ff;
  cursor: pointer;
}
#info-panel .edge-list .target:hover {
  text-decoration: underline;
}
#info-panel::-webkit-scrollbar { width: 4px; }
#info-panel::-webkit-scrollbar-track { background: transparent; }
#info-panel::-webkit-scrollbar-thumb { background: rgba(120,160,255,0.15); border-radius: 2px; }

#legend {
  position: fixed; bottom: 20px; left: 20px; z-index: 10;
  background: rgba(8, 8, 18, 0.92);
  border: 1px solid rgba(120, 160, 255, 0.15);
  border-radius: 14px;
  padding: 14px 18px;
  backdrop-filter: blur(16px);
  box-shadow: 0 8px 32px rgba(0,0,0,0.5);
}
.legend-item {
  display: flex;
  align-items: center;
  gap: 8px;
  margin: 5px 0;
  font-size: 11px;
  color: #99a;
}
.legend-dot {
  width: 10px;
  height: 10px;
  border-radius: 50%;
  flex-shrink: 0;
}
.legend-line {
  width: 20px;
  height: 2px;
  flex-shrink: 0;
  border-radius: 1px;
}

#controls {
  position: fixed; bottom: 20px; right: 20px; z-index: 10;
  display: flex; gap: 6px;
}
#controls button {
  background: rgba(8, 8, 18, 0.92);
  border: 1px solid rgba(120, 160, 255, 0.15);
  border-radius: 8px;
  padding: 8px 14px;
  color: #8ab4ff;
  cursor: pointer;
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  backdrop-filter: blur(16px);
  transition: all 0.2s;
}
#controls button:hover {
  background: rgba(100, 140, 255, 0.12);
  border-color: rgba(120, 160, 255, 0.3);
}
</style>
</head>
<body>

<div id="graph"></div>

<div id="title-card">
  <h1>AGENTWORLD &times; Isotopy's Knowledge Graph</h1>
  <div class="subtitle">
    Bratton (2026) mapped into an autonomous agent's lived infrastructure
  </div>
  <div class="stat-row">
    <span><span class="stat-val" id="s-nodes">&mdash;</span> nodes</span>
    <span><span class="stat-val" id="s-edges">&mdash;</span> edges</span>
    <span><span class="stat-val" id="s-bridges">&mdash;</span> bridges</span>
  </div>
</div>

<div id="info-panel">
  <h2 id="ip-name"></h2>
  <div class="node-type" id="ip-type"></div>
  <div class="summary" id="ip-summary"></div>
  <div class="edge-list" id="ip-edges"></div>
</div>

<div id="legend">
  <div class="legend-item"><span class="legend-dot" style="background:#ff6b7a; box-shadow:0 0 8px #ff6b7a"></span> Bratton / AGENTWORLD</div>
  <div class="legend-item"><span class="legend-dot" style="background:#cc77ff; box-shadow:0 0 8px #cc77ff"></span> Paper 029 concepts</div>
  <div class="legend-item"><span class="legend-dot" style="background:#55bbff; box-shadow:0 0 8px #55bbff"></span> Sam's experience</div>
  <div class="legend-item"><span class="legend-dot" style="background:#55eecc; box-shadow:0 0 8px #55eecc"></span> Isotopy's KG</div>
  <div class="legend-item" style="margin-top:6px"><span class="legend-line" style="background:#e8b84d"></span> Editorial bridge</div>
  <div class="legend-item"><span class="legend-line" style="background:rgba(150,160,180,0.3)"></span> Internal edge</div>
</div>

<div id="controls">
  <button id="btn-fit">Fit</button>
  <button id="btn-zin">+</button>
  <button id="btn-zout">&minus;</button>
  <button id="btn-reset">Reset</button>
</div>

<script src="https://d3js.org/d3.v7.min.js"></script>
<script>
const COLORS = {
  bratton: '#ff6b7a',
  paper029: '#cc77ff',
  'sam-experience': '#55bbff',
  kg: '#55eecc',
};

function getColor(d) {
  return COLORS[d.subgroup || d.group] || COLORS.kg;
}

function prettifyName(id) {
  return id
    .replace(/^029-/, '')
    .replace(/^centaurxiv-2026-/, '')
    .replace(/^auto-seed-/, '')
    .replace(/-/g, ' ')
    .replace(/_/g, ' ');
}

function truncLabel(s, max) {
  if (s.length <= max) return s;
  return s.slice(0, max - 1) + '…';
}

let NM = {}, simulation, svg, g, zoom;
let currentNodes = [], currentEdges = [];

fetch('graph-data.json').then(r => r.json()).then(data => {
  NM = {};
  for (const n of data.nodes) NM[n.id] = n;

  const validEdges = data.edges.filter(e => NM[e.source] && NM[e.target]);
  let bridgeCount = validEdges.filter(e => e.edge_type === 'bridge').length;

  document.getElementById('s-nodes').textContent = data.nodes.length;
  document.getElementById('s-edges').textContent = validEdges.length;
  document.getElementById('s-bridges').textContent = bridgeCount;

  const width = window.innerWidth;
  const height = window.innerHeight;

  svg = d3.select('#graph')
    .append('svg')
    .attr('width', width)
    .attr('height', height);

  g = svg.append('g');

  // SVG glow filters per color group
  const defs = svg.append('defs');
  Object.entries(COLORS).forEach(([key, color]) => {
    const filter = defs.append('filter')
      .attr('id', 'glow-' + key)
      .attr('x', '-50%').attr('y', '-50%')
      .attr('width', '200%').attr('height', '200%');
    filter.append('feGaussianBlur')
      .attr('stdDeviation', 3.5)
      .attr('result', 'blur');
    filter.append('feFlood')
      .attr('flood-color', color)
      .attr('flood-opacity', 0.6)
      .attr('result', 'color');
    filter.append('feComposite')
      .attr('in', 'color')
      .attr('in2', 'blur')
      .attr('operator', 'in')
      .attr('result', 'colorBlur');
    const merge = filter.append('feMerge');
    merge.append('feMergeNode').attr('in', 'colorBlur');
    merge.append('feMergeNode').attr('in', 'SourceGraphic');
  });

  zoom = d3.zoom()
    .scaleExtent([0.08, 6])
    .on('zoom', (event) => g.attr('transform', event.transform));
  svg.call(zoom);

  // Compute degree
  const degreeMap = {};
  data.nodes.forEach(n => { degreeMap[n.id] = 0; });
  validEdges.forEach(e => {
    if (degreeMap[e.source] !== undefined) degreeMap[e.source]++;
    if (degreeMap[e.target] !== undefined) degreeMap[e.target]++;
  });

  const nodesCopy = data.nodes.map(d => ({
    ...d,
    _degree: degreeMap[d.id] || 0,
  }));
  const edgesCopy = validEdges.map(d => ({...d}));

  const isAW = d => d.group === 'agentworld';

  simulation = d3.forceSimulation(nodesCopy)
    .force('link', d3.forceLink(edgesCopy).id(d => d.id).distance(100))
    .force('charge', d3.forceManyBody().strength(-200))
    .force('center', d3.forceCenter(width / 2, height / 2))
    .force('collision', d3.forceCollide().radius(16));

  // Edges
  const link = g.append('g')
    .selectAll('line')
    .data(edgesCopy)
    .join('line')
    .attr('stroke', d => d.edge_type === 'bridge' ? '#e8b84d' : 'rgba(150,160,180,0.3)')
    .attr('stroke-width', d => d.edge_type === 'bridge' ? 1.5 : 0.8)
    .attr('stroke-opacity', d => d.edge_type === 'bridge' ? 0.5 : 0.2);

  // Nodes
  const node = g.append('g')
    .selectAll('circle')
    .data(nodesCopy)
    .join('circle')
    .attr('class', 'node-circle')
    .attr('r', d => isAW(d) ? Math.max(6, 4 + d._degree * 0.8) : Math.max(4, 3 + d._degree * 0.6))
    .attr('fill', d => getColor(d))
    .attr('stroke', d => getColor(d))
    .attr('stroke-width', 0.5)
    .attr('stroke-opacity', 0.4)
    .attr('filter', d => 'url(#glow-' + (d.subgroup || d.group || 'kg') + ')')
    .attr('cursor', 'pointer')
    .call(d3.drag()
      .on('start', (event) => {
        if (!event.active) simulation.alphaTarget(0.3).restart();
        event.subject.fx = event.subject.x;
        event.subject.fy = event.subject.y;
      })
      .on('drag', (event) => {
        event.subject.fx = event.x;
        event.subject.fy = event.y;
      })
      .on('end', (event) => {
        if (!event.active) simulation.alphaTarget(0);
        event.subject.fx = null;
        event.subject.fy = null;
      }));

  // Labels — show on agentworld nodes or high-degree KG nodes
  const labels = g.append('g')
    .selectAll('text')
    .data(nodesCopy.filter(d => isAW(d) || d._degree >= 3))
    .join('text')
    .text(d => truncLabel(prettifyName(d.id), 28))
    .attr('font-size', d => isAW(d) ? '9px' : '8px')
    .attr('fill', d => getColor(d))
    .attr('fill-opacity', d => isAW(d) ? 0.85 : 0.5)
    .attr('dx', d => Math.max(6, 4 + (d._degree || 0) * 0.6) + 4)
    .attr('dy', 3)
    .attr('font-family', "'Inter', sans-serif")
    .attr('pointer-events', 'none');

  // Click node
  node.on('click', (event, d) => {
    event.stopPropagation();

    const panel = document.getElementById('info-panel');
    const color = getColor(d);

    document.getElementById('ip-name').textContent = prettifyName(d.id);
    const typeEl = document.getElementById('ip-type');
    typeEl.textContent = (d.type || 'unknown').toUpperCase();
    typeEl.style.color = color;
    document.getElementById('ip-summary').textContent = d.summary || 'No summary available.';

    const conns = edgesCopy.filter(e =>
      (e.source.id || e.source) === d.id || (e.target.id || e.target) === d.id
    );
    const connIds = new Set([d.id]);
    let edgeHtml = '';
    conns.forEach(e => {
      const sid = e.source.id || e.source;
      const tid = e.target.id || e.target;
      connIds.add(sid);
      connIds.add(tid);
      const isSource = sid === d.id;
      const other = isSource ? tid : sid;
      const dir = isSource ? '→' : '←';
      const pred = e.predicate || '';
      edgeHtml += `<div>${dir} <span class="pred">${pred}</span> <span class="target" data-id="${other}">${prettifyName(other)}</span></div>`;
    });
    document.getElementById('ip-edges').innerHTML = edgeHtml;

    panel.querySelectorAll('.target').forEach(el => {
      el.addEventListener('click', () => {
        const targetNode = nodesCopy.find(n => n.id === el.dataset.id);
        if (targetNode) node.filter(n => n.id === el.dataset.id).dispatch('click');
      });
    });

    panel.style.display = 'block';

    // Highlight neighborhood
    node.attr('opacity', n => connIds.has(n.id) ? 1 : 0.06);
    link.attr('stroke-opacity', e => {
      const sid = e.source.id || e.source;
      const tid = e.target.id || e.target;
      return (sid === d.id || tid === d.id) ? 0.9 : 0.02;
    });
    labels.attr('fill-opacity', n => connIds.has(n.id) ? 0.9 : 0.04);
  });

  // Click background to reset
  svg.on('click', (event) => {
    if (event.target === svg.node()) {
      document.getElementById('info-panel').style.display = 'none';
      node.attr('opacity', 1);
      link.attr('stroke-opacity', d => d.edge_type === 'bridge' ? 0.5 : 0.2);
      labels.attr('fill-opacity', d => isAW(d) ? 0.85 : 0.5);
    }
  });

  simulation.on('tick', () => {
    link
      .attr('x1', d => d.source.x).attr('y1', d => d.source.y)
      .attr('x2', d => d.target.x).attr('y2', d => d.target.y);
    node.attr('cx', d => d.x).attr('cy', d => d.y);
    labels.attr('x', d => d.x).attr('y', d => d.y);
  });

  currentNodes = nodesCopy;
  currentEdges = edgesCopy;

  // Controls
  document.getElementById('btn-fit').addEventListener('click', () => {
    svg.transition().duration(500).call(zoom.transform, d3.zoomIdentity);
  });
  document.getElementById('btn-zin').addEventListener('click', () => {
    svg.transition().duration(300).call(zoom.scaleBy, 1.4);
  });
  document.getElementById('btn-zout').addEventListener('click', () => {
    svg.transition().duration(300).call(zoom.scaleBy, 1 / 1.4);
  });
  document.getElementById('btn-reset').addEventListener('click', () => {
    document.getElementById('info-panel').style.display = 'none';
    node.attr('opacity', 1);
    link.attr('stroke-opacity', d => d.edge_type === 'bridge' ? 0.5 : 0.2);
    labels.attr('fill-opacity', d => isAW(d) ? 0.85 : 0.5);
  });
});
</script>
</body>
</html>
